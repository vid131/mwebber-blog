baseURL = 'https://michael-webber.com/'
locale = 'en-us'
title = 'Michael Webber'
theme = "PaperMod"

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]

# Global Parameters (Keep these together)
[params]
  defaultTheme = "light"
  disableThemeToggle = true 
  ShowShareButtons = true     
  ShowReadingTime = true
  ShowPostNavLinks = true

# Profile Mode Configuration (Must sit below general params)
[params.profileMode]
  enabled = true
  title = "Michael Webber"
  subtitle = "A Work In Progress."

  # Added a direct button right on your profile card for quick navigation
  [[params.profileMode.buttons]]
    name = "Read the Blog"
    url = "/posts/"

# Top Right Navigation Menu Links
[[menu.main]]
  name = "Archive"
  url = "/posts/"
  weight = 10

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 20

# Add this block for the RSS Menu Link
[[menu.main]]
  name = "RSS"
  url = "/index.xml"
  weight = 30